media:
  input: assets/img/posts
  output: /assets/img/posts

content:
  - name: posts
    label: Posts
    type: collection
    path: _posts
    format: yaml-frontmatter

    filename:
      template: "{year}-{month}-{day}-{primary}.md"
      field: date

    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: date
        label: Date
        type: date
        required: true

      - name: categories
        label: Categories
        type: string
        list: true

      - name: tags
        label: Tags
        type: string
        list: true

      - name: description
        label: Description
        type: text

      - name: pin
        label: Pin post
        type: boolean
        default: false

      - name: body
        label: Content
        type: rich-text
        options:
          format: markdown
          switcher: true